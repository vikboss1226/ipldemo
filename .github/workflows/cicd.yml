# ------------------------------------------------------------------
# Single-file CI/CD: Install -> Test -> Build -> Provision EC2 -> Deploy (Nginx)
#
# This replaces the old separate ci.yml + deploy.yml.
#
# This workflow assumes the EC2 instance is BLANK (nothing installed).
# Every run checks whether Nginx exists and installs/configures it if not,
# so the first run provisions the server and every later run just deploys.
# If tests fail, the build/provision/deploy steps never run.
#
# Required GitHub Secrets (Repo Settings > Secrets and variables > Actions):
#   EC2_HOST       - EC2 public IP or DNS (e.g. 13.234.56.78)
#   EC2_USERNAME   - SSH user (ubuntu for Ubuntu AMI, ec2-user for Amazon Linux)
#   EC2_SSH_KEY    - Full contents of your .pem private key
#
# One-time, AWS-side step this workflow CANNOT do for you (it runs inside
# the OS, not the AWS API): open the Security Group attached to the
# instance for inbound:
#   - Port 22  (SSH)   - your IP / GitHub Actions
#   - Port 80  (HTTP)  - 0.0.0.0/0
# Do this once in the EC2 console (Security Groups > Edit inbound rules).
#
# Builds with `npm run build` (react-scripts), output folder: build/
# ------------------------------------------------------------------

name: CI/CD - Build, Test, Deploy to EC2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------- CI: install, test, build ----------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm test -- --watchAll=false

      - name: Build React app
        run: npm run build

      # ---------- CD: provision EC2, then deploy ----------
      - name: Provision EC2 (install & start Nginx if missing)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if ! command -v nginx >/dev/null 2>&1; then
              echo "Nginx not found, installing..."
              sudo apt-get update -y
              sudo apt-get install -y nginx
            else
              echo "Nginx already installed, skipping install."
            fi
            sudo systemctl enable nginx
            sudo systemctl start nginx
            sudo mkdir -p /var/www/html
            sudo chown -R ${{ secrets.EC2_USERNAME }}:${{ secrets.EC2_USERNAME }} /var/www/html
            if command -v ufw >/dev/null 2>&1; then
              sudo ufw allow 'Nginx Full' || true
            fi

      - name: Copy build files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/*"
          target: "/home/${{ secrets.EC2_USERNAME }}/app-deploy"
          strip_components: 1

      - name: Move files into Nginx web root and reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo rm -rf /var/www/html/*
            sudo cp -r /home/${{ secrets.EC2_USERNAME }}/app-deploy/* /var/www/html/
            sudo systemctl reload nginx
            rm -rf /home/${{ secrets.EC2_USERNAME }}/app-deploy
